name: Deploy Frontend to Homelab

on:
  push:
    branches: [ "master", "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Setup Twingate untuk akses jaringan lokal
    - name: Setup Twingate
      uses: twingate/github-action@v1
      with:
        service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

    # Deploy frontend via SSH
    - name: Deploy Frontend to Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 192.168.0.111
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/samvivan/portfolio/Portfolio-v1.0
          git pull
          
          # Deploy frontend dengan docker-compose production config
          echo "Building and deploying frontend..."
          cd frontend
          docker compose -f docker-compose.prod.yaml up -d --build
          
          echo "✓ Frontend deployment completed"
          echo "Checking container status..."
          docker ps --filter "name=portfolio-prod"