version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-dev
    ports:
      - "3003:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    # Uncomment untuk edit kode dan lihat perubahan langsung (dev mode dengan hot reload)
    # volumes:
    #   - .:/app
    #   - /app/node_modules
    #   - /app/.next

networks:
  portfolio-network:
    driver: bridge
