version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio:latest
    container_name: portfolio-prod
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    # Persistent volumes untuk data production
    volumes:
      - portfolio-data:/app/public/uploads
      - portfolio-cache:/app/.next/cache
    # Resource limits untuk production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  portfolio-data:
    driver: local
  portfolio-cache:
    driver: local

networks:
  portfolio-network:
    driver: bridge
