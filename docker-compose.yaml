services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samvivan-portfolio
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    networks:
      - webnet
    # Uncomment ini kalau kamu mau edit kode dan lihat hasilnya langsung (dev mode)
    # volumes:
    #   - .:/app
    #   - /app/node_modules

networks:
  webnet:
    driver: bridge
