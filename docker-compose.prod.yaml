services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio:latest
    container_name: portfolio_prod
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
